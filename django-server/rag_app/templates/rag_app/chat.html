{% extends "rag_app/base.html" %}

{% block content %}
<div class="chat-container">
    <h1>Chat with the LLM</h1>
    <div class="chat-box" id="chat-box">
        <!-- User and bot messages will be appended here by JavaScript -->
    </div>

    <form id="chat-form" class="chat-form">
        {% csrf_token %}
        <textarea id="query" name="query" placeholder="Type your question here..."></textarea>
        <div class="chat-form-controls">
            <label for="n_results">Retrieved docs:</label>
            <input
                type="number"
                id="n_results"
                name="n_results"
                value="{{ default_n_results }}"
                min="1"
                max="50"
                title="Number of document chunks retrieved from the vector database per query"
            >
            <label class="hyde-label" for="use_hyde" title="HyDE: ask the LLM to generate a hypothetical answer first, then embed that instead of your raw question. Usually improves retrieval quality for short or ambiguous questions.">
                <input type="checkbox" id="use_hyde" {% if config_use_hyde %}checked{% endif %}>
                HyDE
            </label>
            <button type="submit">Send</button>
        </div>
    </form>

    {% if record_data %}
    <p>This session is being recorded!</p>
    {% endif %}
</div>

<script>
    document.getElementById('chat-form').addEventListener('submit', function(event) {
        event.preventDefault();

        const queryInput = document.getElementById('query');
        const userQuery = queryInput.value.trim();
        if (!userQuery) return;

        const chatBox = document.getElementById('chat-box');

        // Display user message
        const userMsgDiv = document.createElement('div');
        userMsgDiv.className = 'user-message';
        userMsgDiv.innerHTML = `<p><strong>You:</strong> ${userQuery}</p>`;
        chatBox.appendChild(userMsgDiv);

        queryInput.value = '';

        // Bot message container
        const botMsgDiv = document.createElement('div');
        botMsgDiv.className = 'bot-message';

        const botResponseElem = document.createElement('span');
        botMsgDiv.innerHTML = `<p><strong>Bot:</strong> </p>`;
        botMsgDiv.querySelector('p').appendChild(botResponseElem);

        // Docs toggle (hidden until docs arrive)
        const docsContainer = document.createElement('div');
        docsContainer.style.display = 'none';
        docsContainer.className = 'docs-container';

        const docsToggleLink = document.createElement('a');
        docsToggleLink.href = '#';
        docsToggleLink.textContent = 'Documents used to get this answer';
        docsToggleLink.style.display = 'none';
        docsToggleLink.addEventListener('click', function(e) {
            e.preventDefault();
            docsContainer.style.display = docsContainer.style.display === 'none' ? 'block' : 'none';
        });

        botMsgDiv.appendChild(docsToggleLink);
        botMsgDiv.appendChild(docsContainer);
        chatBox.appendChild(botMsgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        // Prepare form data
        const formData = new FormData();
        formData.append('query', userQuery);
        formData.append('n_results', document.getElementById('n_results').value);
        formData.append('use_hyde', document.getElementById('use_hyde').checked ? '1' : '0');
        formData.append('csrfmiddlewaretoken',
            document.querySelector('[name=csrfmiddlewaretoken]').value);

        // Stream the response from the server
        fetch("{% url 'chat_stream' %}", {
            method: 'POST',
            body: formData,
        })
        .then(response => {
            if (!response.body) {
                throw new Error("ReadableStream not yet supported in this browser.");
            }
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            // buffer accumulates ALL received bytes across reads.
            // We never reset it so the <|DOCS_JSON|> marker is detected
            // even if it straddles two consecutive network reads.
            let buffer = '';
            // Track how many chars of buffer we have already displayed.
            let displayed = 0;

            function readChunk() {
                return reader.read().then(({ done, value }) => {
                    if (done) return;

                    buffer += decoder.decode(value, {stream: true});

                    const markerIndex = buffer.indexOf('<|DOCS_JSON|>');
                    if (markerIndex !== -1) {
                        // Display any LLM text that came before the marker
                        // and hasn't been shown yet.
                        const beforeMarker = buffer.slice(displayed, markerIndex);
                        if (beforeMarker) {
                            botResponseElem.textContent += beforeMarker;
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }

                        const docsText = buffer.slice(markerIndex + '<|DOCS_JSON|>'.length);
                        let docsData = [];
                        let hydeDoc  = null;
                        try {
                            const metaPayload = JSON.parse(docsText);
                            docsData = metaPayload.docs     || [];
                            hydeDoc  = metaPayload.hyde_doc || null;
                        } catch (e) {
                            console.error('[RAG] Error parsing DOCS_JSON:', e, 'raw:', docsText);
                        }

                        // Collapsible HyDE section (only when a real hypothesis was generated)
                        if (hydeDoc) {
                            const hydeToggle = document.createElement('a');
                            hydeToggle.href = '#';
                            hydeToggle.className = 'hyde-toggle-link';
                            hydeToggle.textContent = 'View hypothetical document used for retrieval (HyDE \u25bc)';

                            const hydeBox = document.createElement('div');
                            hydeBox.className = 'hyde-content';
                            hydeBox.style.display = 'none';
                            hydeBox.textContent = hydeDoc;

                            hydeToggle.addEventListener('click', function(e) {
                                e.preventDefault();
                                const hidden = hydeBox.style.display === 'none';
                                hydeBox.style.display = hidden ? 'block' : 'none';
                                hydeToggle.textContent = hidden
                                    ? 'Hide hypothetical document (HyDE \u25b2)'
                                    : 'View hypothetical document used for retrieval (HyDE \u25bc)';
                            });

                            botMsgDiv.insertBefore(hydeToggle, docsToggleLink);
                            botMsgDiv.insertBefore(hydeBox,    docsToggleLink);
                        }

                        // Collapsible retrieved documents section
                        if (docsData.length > 0) {
                            docsToggleLink.style.display = 'inline-block';
                            let html = '';
                            docsData.forEach((doc, idx) => {
                                html += `
                                    <div class="single-doc">
                                        <p><strong>Document ${idx + 1}</strong></p>
                                        <p><strong>File Name:</strong> ${doc.file_name}</p>
                                        <p><strong>Chunk ID:</strong> ${doc.chunk_id}</p>
                                        ${doc.page_number != null ? `<p><strong>Page:</strong> ${doc.page_number}</p>` : ''}
                                        ${doc.section_title ? `<p><strong>Section:</strong> ${doc.section_title}</p>` : ''}
                                        ${doc.source_url ? `<p><strong>Source:</strong> <a href="${doc.source_url}" target="_blank">${doc.source_url}</a></p>` : ''}
                                        ${doc.ingest_date ? `<p><strong>Indexed:</strong> ${doc.ingest_date}</p>` : ''}
                                        <pre>${doc.content}</pre>
                                    </div>
                                    <hr/>
                                `;
                            });
                            docsContainer.innerHTML = html;
                        }
                        return; // done reading
                    }

                    // No marker yet: display only the new bytes we haven't shown.
                    const newText = buffer.slice(displayed);
                    if (newText) {
                        botResponseElem.textContent += newText;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                    displayed = buffer.length;
                    return readChunk();
                });
            }

            return readChunk();
        })
        .catch(err => {
            console.error("Error fetching streaming response:", err);
        });
    });
</script>

{% endblock %}
